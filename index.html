  <!-- main page --------------------------------------- -->

  <section id="main-page" class="bg-[#64748B10]">
    <!-- ei section e class hisebe hidden dile initially full main page hidden thakbe -->
    <header>
      <!-- navbar -->
      <div
        class="navbar bg-base-100 shadow-sm w-full mx-auto md:px-16 flex flex-col md:flex-row items-center md:justify-between gap-3">
        <div class="flex justify-center items-center">
          <img class="w-8 h-8" src="./assets/github-logo.png" alt="">
          <a class="btn btn-ghost text-xl">GitHub Issues Tracker</a>
        </div>
        <div class="flex justify-between md:flex gap-3">
          <!-- <i class="fa-solid fa-magnifying-glass absolute top-1/2"></i> -->
          <input type="text" placeholder="Search Issues..." class="input input-bordered w-52 md:w-auto" />
          <button class="btn btn-primary">Search</button>
        </div>
      </div>
    </header>

    <main class="w-11/12 md:w-4/5 mx-auto">
      <!-- tab section -->
      <section class="my-10 bg-white rounded-md">
        <div class="p-5 flex gap-10">
          <button id="all" class="btn btn-primary md:px-8">All</button>
          <button id="open" class="btn btn-soft btn-primary md:px-8">Open</button>
          <button id="closed" class="btn btn-soft btn-primary md:px-8">Closed</button>
        </div>
      </section>

      <!-- count section -->
      <section class="mt-10 py-2 bg-white rounded-md">
        <div class="flex justify-between px-1 md:px-5">
          <!-- left -->
          <div class="flex items-center gap-3">
            <div>
              <img src="./assets/Aperture.png" alt="">
            </div>
            <div>
              <h3 id="card-count" class="text-xl font-semibold">0 Issues</h3>
              <p class="text-[#64748B90]">Track and manage your project issues</p>
            </div>
          </div>
          <!-- right -->
          <div class="flex items-center gap-2 md:gap-5">
            <div>
              <p class="flex items-center gap-2"><span class="bg-green-500 w-3 h-3 rounded-full"></span>Open</p>
            </div>
            <div>
              <p class="flex items-center gap-2"><span class="bg-purple-500 w-3 h-3 rounded-full"></span>Closed</p>
            </div>
          </div>
        </div>
      </section>

      <!-- loading spinner section -->
       <section id="spinner" class="flex justify-center items-center py-3 bg-yellow-50 hidden">
        <span class="loading loading-dots loading-xl"></span>
       </section>

      <!-- dynamic card section -->
      <section id="card-section" class="bg-yellow-50 rounded-md p-5 grid grid-cols-1 md:grid-cols-4 gap-3 justify-items-center"></section>

      <!-- modal section -->
      <dialog id="word_modal" class="modal modal-middle">
        <div class="modal-box">
           <section id="modal-section"></section>

          <div class="modal-action">
            <form method="dialog">

              <button class="btn btn-primary">Close</button>
            </form>
          </div>
        </div>
      </dialog>

    </main>
  </section>

  <script src="./scripts/script.js"></script>
</body>
