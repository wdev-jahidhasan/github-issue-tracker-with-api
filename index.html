<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tracker</title>

  <!-- font setup -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

  <style>
    * {
      font-family: "Geist", sans-serif;
    }
  </style>

  <!-- tailwind and DaisyUI setup -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- font awesome setup -->
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
  <!-- login page design ------------------------------ -->
  <section class="w-11/12 mx-auto max-w-[500px] my-3">
    <!-- upper div-->
    <div class="text-center">
      <img src="./assets/github-logo.png" alt="" class="mx-auto my-6">
      <h3 class="text-2xl font-semibold">GitHub Issue Tracker</h3>
      <p class="text-[#64748B]">sign in to manage your issues</p>
    </div>
    <!-- login form -->
    <form action="" class="my-3">
      <label for="username">Username</label>
      <br>
      <input type="text" name="username" placeholder="Enter Username" id="" class="w-full p-2 rounded-sm">
      <p class="text-violet-700 font-medium">Default: admin</p>

      <br>

      <label for="password">Password</label>
      <br>
      <input type="password" name="password" placeholder="Enter Password" id="" class="w-full p-2 rounded-sm">
      <p class="text-violet-700 font-medium">Default: admin123</p>

      <br>
      <input type="submit" value="login" class="btn btn-primary w-full">

    </form>
    <!-- lower div -->
    <div>
      <div class="flex items-center py-2">
        <hr class="flex-1 border-gray-300">
        <span class="px-3 text-gray-500">OR</span>
        <hr class="flex-1 border-gray-300">
      </div>
      <p class="text-center text-lg font-medium text-[#1F293780] mb-3">Demo Credentials:</p>
      <div class="bg-[#1F293710] text-center py-5 rounded-md">
        <p class="text-xl font-medium">Username: admin</p>
        <p class="text-xl font-medium">Password: admin123</p>
      </div>
    </div>

  </section>

  <!-- main page --------------------------------------- -->

  <header>
    <!-- navbar -->
    <div class="navbar bg-base-100 shadow-sm w-full grid grid-flow-row sm:flex justify-between">
      <div class="flex justify-center items-center">
        <img class="w-8 h-8" src="./assets/github-logo.png" alt="">
        <a class="btn btn-ghost text-xl">GitHub Issues Tracker</a>
      </div>
      <div class="flex gap-2">
        <!-- <i class="fa-solid fa-magnifying-glass absolute top-1/2"></i> -->
        <input type="text" placeholder="Search Issues..." class="input input-bordered w-24 md:w-auto" />
        <button class="btn btn-primary">+ New Issue</button>
      </div>
    </div>
  </header>

  <script src="./scripts/script.js"></script>
</body>

</html>
